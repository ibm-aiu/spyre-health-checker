name: CRC Spyre Health Checker End to End Test

on:
  workflow_dispatch:
    inputs:
      branch-name:
        description: "Branch name to checkout from spyre-health-checker repo"
        required: false
        type: string
        default: "main"
      registry:
        description: 'Container registry to push to (e.g., ghcr.io, docker.io)'
        required: false
        type: string
        default: 'ghcr.io/ibm-aiu'
      pr-url:
        description: 'GitHub Pull Request URL to test. If provided, will fetch and
          test the PR branch.'
        required: false
        type: string
      operator-version:
        description: "Spyre Health Checker tag to run in test"
        required: false
        type: string
      operator-channel:
        description: "Operator channel"
        required: false
        type: string
  push:
    branches:
    - '**'

permissions:
  contents: read
  packages: write

env:
  CRC_REGISTRY: default-route-openshift-image-registry.apps-crc.testing

jobs:
  crc-test:
    uses: ibm-aiu/spyre-operator-actions/.github/workflows/crc-e2e-test.yaml@main
    secrets:
      CRC_PULL_SECRET_SUNYACH: ${{ secrets.CRC_PULL_SECRET_SUNYACH }}
    with:
      runner: ubuntu-latest
      repository: ibm-aiu/spyre-health-checker
      path: spyre-health-checker