name: Unit Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: Run tests
      run: make test
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      if: always()
      with:
        files: ./coverage.out
